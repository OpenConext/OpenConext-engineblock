openconext_engineblock_authentication:
    resource: '../src/OpenConext/EngineBlockBundle/Resources/config/routing.yml'
    type: annotation
    host: "engine.{domain}"
    requirements:
        domain: ".*"
    defaults:
        domain: "%domain%"

openconext_engineblock_api:
    resource: '../src/OpenConext/EngineBlockBundle/Resources/config/routing_api.yml'
    type: annotation
    host: "engine-api.{domain}"
    requirements:
        domain: ".*"
    defaults:
        domain: "%domain%"
